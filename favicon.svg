<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ocean background -->
  <rect width="100" height="100" rx="20" fill="#1565a8"/>
  <!-- Subtle lighter water shimmer -->
  <rect x="0" y="56" width="100" height="44" rx="0" fill="#1a78c2" opacity="0.35"/>
  <rect width="100" height="100" rx="20" fill="none" stroke="none"/>

  <!-- Island shape clipping path -->
  <defs>
    <clipPath id="isl">
      <path d="M14,63 C14,47 32,40 50,40 C68,40 86,47 86,63 C86,77 68,80 50,80 C32,80 14,77 14,63Z"/>
    </clipPath>
  </defs>

  <!-- Italian tricolor painted on island -->
  <g clip-path="url(#isl)">
    <rect x="0"  y="0" width="37" height="100" fill="#009246"/>
    <rect x="37" y="0" width="26" height="100" fill="#FFFFFF"/>
    <rect x="63" y="0" width="37" height="100" fill="#CE2B37"/>
  </g>

  <!-- Island outline -->
  <path d="M14,63 C14,47 32,40 50,40 C68,40 86,47 86,63 C86,77 68,80 50,80 C32,80 14,77 14,63Z"
        fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
</svg>
